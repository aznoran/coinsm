<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Автоматизация</title>
<link rel="stylesheet" href="/static/style.css">
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <h1><i data-lucide="bot" class="icon"></i> Автоматизация</h1>

  <div class="card">
    <div class="card-title"><i data-lucide="plus-circle" class="icon icon-sm"></i> Добавить страницу</div>
    <form id="add-form">
      <div class="form-grid">
        <div class="field">
          <label class="field-label" for="f-url">Ссылка</label>
          <div class="input-with-btn">
            <input id="f-url" type="url" name="url" required placeholder="https://coins.bank.gov.ua/...">
            <button type="button" class="btn btn-ghost paste-btn" onclick="pasteUrl()" title="Вставить из буфера">
              <i data-lucide="clipboard-paste" class="icon icon-sm"></i>
            </button>
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="f-label">Название</label>
          <input id="f-label" type="text" name="label" placeholder="Необязательное название">
        </div>
      </div>
      <div class="form-grid">
        <div class="field">
          <label class="field-label" for="f-start">Начало окна</label>
          <input id="f-start" type="datetime-local" name="window_start" required>
        </div>
        <div class="field">
          <label class="field-label" for="f-end">Конец окна</label>
          <input id="f-end" type="datetime-local" name="window_end" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">
        <i data-lucide="calendar-plus" class="icon icon-sm"></i>
        Запланировать
      </button>
    </form>
  </div>

  <div class="card">
    <div class="card-title"><i data-lucide="list" class="icon icon-sm"></i> Страницы</div>
    <table>
      <thead>
        <tr>
          <th>Страница</th>
          <th>Окно</th>
          <th>Статус</th>
          <th>Попытки</th>
          <th>Ошибка</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="pages-tbody">
        <tr><td colspan="6" class="empty-state">Страниц пока нет.</td></tr>
      </tbody>
    </table>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
